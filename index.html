<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse & Cheese Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121214;
            color: #eaeaea;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            text-align: center;
            padding: 40px;
            border-radius: 16px;
            background: #1a1a1e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2a30;
            max-width: 400px;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            color: #ffcc00;
            margin: 0 0 10px 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }
        p {
            color: #a4a4a4;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            background-color: #ffcc00;
            color: #121214;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #e6b800;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">🧀</div>
        <h1>Mouse & Cheese</h1>
        <p>Официальный сайт проекта успешно запущен и готов к работе!</p>
        <a href="#" class="btn">Релиз 10 июня!</a>
    </div>

</body>
</html>
